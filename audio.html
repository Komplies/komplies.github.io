<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jackson – Video Portfolio | Student @ FSS</title>
  <meta name="description" content="Video portfolio of Jackson: Communications Technology Student at FSS, showcasing video editing and production work." />
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind config (tweak colors, fonts, container width here)
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#6366f1',        // Update to your preferred accent
            surface: '#0b1220',       // Dark card surface
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'Segoe UI', 'Roboto', 'Arial', 'sans-serif'],
            mono: ['Source Code Pro', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          maxWidth: {
            'content': '1040px',
          },
          borderRadius: {
            xl: '14px',
          },
          boxShadow: {
            glow: '0 8px 24px rgba(99, 102, 241, 0.25)',
          }
        }
      },
      darkMode: 'class'
    };
  </script>
  <!-- Optional: preload Google Fonts (swap later if you prefer another font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Source+Code+Pro:wght@500&display=swap" rel="stylesheet">
  <style>
    /* Smooth focus ring for accessibility */
    :focus-visible { outline: none !important; box-shadow: 0 0 0 3px rgba(99,102,241,.35) !important; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
  <a href="index.html" class="fixed top-4 left-4 text-white text-xl hover:text-accent transition">&larr; Back</a>
  <a onclick="showModal()" class="fixed top-2.5 left-[95px] inline-flex items-center gap-2 border border-slate-700 text-white font-semibold px-4 py-2 rounded-xl bg-slate-800 hover:bg-accent hover:shadow-glow transition cursor-pointer">Projects</a>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-slate-800 p-6 rounded-xl max-w-md w-full mx-4">
      <h3 class="text-xl font-semibold mb-4 text-white">Choose a Gallery</h3>
      <ul class="space-y-2">
        <li><a href="audio.html" class="block text-accent hover:underline">Audio</a></li>
        <li><a href="image.html" class="block text-accent hover:underline">Image</a></li>
        <li><a href="video.html" class="block text-accent hover:underline">Video</a></li>
      </ul>
      <button onclick="closeModal()" class="mt-4 bg-accent text-white px-4 py-2 rounded">Close</button>
    </div>
  </div>

  <div class="flex items-center justify-center h-screen">
    <h1 class="text-6xl font-bold text-white">Haven't done this yet</h1>
  </div>

  <script>
    // Modal functions
    function showModal() {
      document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }
  </script>
</body>
</html>
